name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test suite ──────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install pytest

      - name: Verify cryptography installs and imports
        run: python -c "import cryptography; print('cryptography', cryptography.__version__, 'OK')"

      - name: Run tests
        run: pytest tests/ -v

  # ── Installation smoke-test (mirrors what setup.sh does) ───────────────────
  install-smoke:
    name: Installation smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libssl-dev libffi-dev build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment and install requirements
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet
          .venv/bin/pip install -r requirements.txt --quiet --prefer-binary

      - name: Verify all key packages import correctly
        run: |
          .venv/bin/python -c "import cryptography; print('cryptography', cryptography.__version__)"
          .venv/bin/python -c "import google.auth; print('google.auth OK')"
          .venv/bin/python -c "import google.oauth2.credentials; print('google.oauth2 OK')"
          .venv/bin/python -c "import googleapiclient.discovery; print('googleapiclient OK')"
          .venv/bin/python -c "import requests; print('requests OK')"
